# ============================================================================
# DATASOURCE CONFIGURATION
# ============================================================================
# 
# Currently using H2 in-memory database for development/testing
# To switch to Supabase PostgreSQL:
#   1. Set up Supabase project (see SUPABASE_SETUP.md)
#   2. Run schema: supabase-backend/supabase-schema.sql
#   3. Update credentials in: application-supabase.properties
#   4. Start with profile: mvn spring-boot:run -Dspring-boot.run.profiles=supabase
#
# ============================================================================

# Application Info
spring.application.name=ParentCare AI Platform
server.port=8080

# H2 Database Configuration (IN-MEMORY - for testing only)
spring.datasource.url=jdbc:h2:mem:parentcare
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Jackson JSON Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Actuator Endpoints (Production Monitoring)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.parentcare=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

