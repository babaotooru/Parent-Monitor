# Supabase PostgreSQL Configuration for Spring Boot
# To use this profile, run: mvn spring-boot:run -Dspring-boot.run.profiles=supabase

# Database Connection
# Update these values with your Supabase credentials from https://app.supabase.com
# Navigate to: Settings → Database
spring.datasource.url=jdbc:postgresql://db.ihplrgdtvwgjscdopbth.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=ParentCare@123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection Pool Settings (optimized for Supabase)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Disable H2 Console when using Supabase
spring.h2.console.enabled=false

# Optional: Use Supabase connection pooler (port 6543) for better performance
# spring.datasource.url=jdbc:postgresql://db.drodwchxhknxatebdxeg.supabase.co:6543/postgres?pgbouncer=true

# Security configuration (keep existing settings)
spring.security.user.name=admin
spring.security.user.password=admin

# Server Configuration
server.port=8080
